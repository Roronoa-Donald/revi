<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards PHP POO — Révisions interactives</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/features.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .flashcard-filters { display: flex; flex-wrap: wrap; gap: .5rem; justify-content: center; margin: 1.5rem 0; }
        .filter-btn { padding: .5rem 1rem; border: 2px solid var(--border-color); border-radius: 20px; background: none; cursor: pointer; font-weight: 600; font-size: .88rem; color: var(--text-secondary); transition: all .2s; }
        .filter-btn.active, .filter-btn:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 1rem 0; perspective: 1000px; }
        .flashcard { height: 220px; cursor: pointer; perspective: 1000px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform .6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border: 1px solid var(--border-color); }
        .flashcard-front { background: var(--bg-primary); }
        .flashcard-front h3 { font-size: 1rem; margin-bottom: .5rem; color: var(--text-primary); }
        .flashcard-front .hint { font-size: .78rem; color: var(--text-secondary); margin-top: auto; }
        .flashcard-back { background: linear-gradient(135deg, var(--primary-color), #6d28d9); color: #fff; transform: rotateY(180deg); font-size: .92rem; line-height: 1.5; }
        .flashcard-back code { background: rgba(255,255,255,.2); padding: .1rem .4rem; border-radius: 4px; }
        .flashcard-chapter { display: inline-block; background: rgba(139,92,246,.15); color: var(--primary-color); padding: .15rem .5rem; border-radius: 10px; font-size: .72rem; font-weight: 600; margin-bottom: .5rem; }
        @media (max-width: 600px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <div class="logo"><a href="index.html"><i class="fas fa-code"></i><span>PHP POO</span></a></div>
            <nav class="main-nav">
                <a href="index.html">Accueil</a>
                <a href="formules.html">Cheatsheet</a>
                <a href="#" class="active">Flashcards</a>
                <button class="btn-theme" id="themeToggleBtn" title="Changer de thème"><i class="fas fa-moon"></i></button>
            </nav>
        </div>
    </header>

    <main id="main-content" style="max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem;">
        <div style="text-align:center; margin-bottom: 1rem;">
            <h1 style="font-size: 2rem;"><i class="fas fa-clone" style="color:var(--primary-color);"></i> Flashcards PHP POO</h1>
            <p style="color: var(--text-secondary);">Cliquez sur une carte pour révéler la réponse — <span id="total-count"></span> cartes</p>
        </div>

        <div class="flashcard-filters" id="filters"></div>
        <div class="cards-grid" id="cards-grid"></div>
    </main>

    <footer class="main-footer"><div class="container"><p>&copy; 2025-2026 Cours PHP POO.</p></div></footer>
    <script src="assets/js/main.js"></script>
    <script>
    const flashcards = [
        // Ch1 — Bases POO
        { ch: 1, q: "Quel mot-clé crée un objet en PHP ?", a: "<code>new</code> — ex: <code>$u = new User();</code>" },
        { ch: 1, q: "Que signifie $this en PHP POO ?", a: "Référence à l'instance courante de la classe (l'objet lui-même)." },
        { ch: 1, q: "Quelle méthode est appelée automatiquement à la création d'un objet ?", a: "<code>__construct()</code> — le constructeur." },
        { ch: 1, q: "Différence entre une propriété et une méthode ?", a: "Propriété = variable de l'objet ($nom). Méthode = fonction de l'objet (getNom())." },
        { ch: 1, q: "Comment accéder à une propriété d'un objet ?", a: "Avec la flèche : <code>$objet->propriete</code> (pas le point !)." },
        { ch: 1, q: "Que fait __toString() ?", a: "Permet de convertir l'objet en chaîne. Appelé automatiquement par echo." },
        // Ch2 — Concepts avancés
        { ch: 2, q: "Quel mot-clé permet l'héritage en PHP ?", a: "<code>extends</code> — ex: <code>class Admin extends User</code>" },
        { ch: 2, q: "PHP supporte-t-il l'héritage multiple ?", a: "Non ! Un seul <code>extends</code>. Utilisez les interfaces et traits à la place." },
        { ch: 2, q: "Différence entre abstract et interface ?", a: "Abstract = peut avoir du code + propriétés. Interface = signatures pures, multi-implémentation." },
        { ch: 2, q: "Que signifie le polymorphisme ?", a: "Même méthode, comportement différent selon la classe. Ex: calculerSurface() pour Cercle et Rectangle." },
        { ch: 2, q: "Peut-on instancier une classe abstraite ?", a: "Non ! <code>new AbstractClass()</code> → Fatal Error. Il faut créer une classe fille concrète." },
        { ch: 2, q: "Comment appeler le constructeur parent ?", a: "<code>parent::__construct(...)</code> dans le constructeur de la classe fille." },
        // Ch3 — Autoloading, Namespaces, Traits
        { ch: 3, q: "include vs require ?", a: "include → warning si absent (continue). require → fatal error si absent (stop)." },
        { ch: 3, q: "À quoi sert spl_autoload_register() ?", a: "Charge automatiquement les fichiers de classes quand elles sont instanciées. Fini les require manuels !" },
        { ch: 3, q: "Qu'est-ce qu'un namespace ?", a: "Un espace de noms qui évite les conflits. Ex: App\\Entity\\User ne collision pas avec Lib\\Entity\\User." },
        { ch: 3, q: "Comment utiliser un namespace ?", a: "<code>use App\\Entity\\User;</code> puis <code>new User();</code> — ou alias avec <code>as</code>." },
        { ch: 3, q: "Qu'est-ce qu'un Trait ?", a: "Un ensemble de méthodes réutilisables injectées avec <code>use Loggable;</code> dans une classe." },
        { ch: 3, q: "Que fait la norme PSR-4 ?", a: "Lie namespace → dossier. App\\Entity\\User → src/Entity/User.php. Standard Composer." },
        // Ch4 — Gestion erreurs
        { ch: 4, q: "Quelle est la différence entre Exception et Error ?", a: "Exception = erreurs applicatives (attrapables). Error = erreurs internes PHP (TypeError, etc.)." },
        { ch: 4, q: "Que fait le bloc finally ?", a: "S'exécute TOUJOURS après try/catch, même après un return !" },
        { ch: 4, q: "Comment lancer une exception ?", a: "<code>throw new Exception('message');</code>" },
        { ch: 4, q: "Multi-catch en PHP 7+ ?", a: "<code>catch (TypeError | ValueError $e)</code> — attrape les deux types en un seul catch." },
        { ch: 4, q: "Pourquoi catch(Exception $e) {} est dangereux ?", a: "Catch vide = bug silencieux. L'erreur disparaît sans aucune trace. Toujours loguer ou traiter !" },
        { ch: 4, q: "Comment créer une exception personnalisée ?", a: "<code>class MonException extends Exception { }</code> — puis throw/catch spécifique." },
        // Ch5 — PDO
        { ch: 5, q: "Que signifie PDO ?", a: "PHP Data Objects — interface uniforme pour accéder à MySQL, PostgreSQL, SQLite, etc." },
        { ch: 5, q: "query() vs prepare() ?", a: "query() = requêtes sans paramètres. prepare() + execute() = avec paramètres (sécurisé)." },
        { ch: 5, q: "Pourquoi les requêtes préparées sont-elles essentielles ?", a: "Protection contre les injections SQL. Les paramètres sont échappés automatiquement." },
        { ch: 5, q: "fetch() vs fetchAll() ?", a: "fetch() = 1 ligne à la fois (en boucle). fetchAll() = toutes les lignes d'un coup (tableau)." },
        { ch: 5, q: "Quel mode de fetch est le plus courant ?", a: "<code>PDO::FETCH_ASSOC</code> — retourne un tableau associatif (clé = nom de colonne)." },
        { ch: 5, q: "Comment récupérer le dernier ID inséré ?", a: "<code>$pdo->lastInsertId()</code> — après un INSERT avec auto-increment." },
        // Ch6 — Architecture
        { ch: 6, q: "Que signifie MVC ?", a: "Modèle-Vue-Contrôleur. M=données, V=affichage, C=logique de routage." },
        { ch: 6, q: "Peut-on mettre du SQL dans la Vue ?", a: "NON ! Le SQL est dans le Modèle. La Vue ne fait que de l'affichage HTML." },
        { ch: 6, q: "Qu'est-ce que le pattern Singleton ?", a: "Garantit une seule instance d'une classe (ex: connexion BDD). Constructeur privé + méthode statique." },
        { ch: 6, q: "Quel est le rôle du routeur ?", a: "Analyser l'URL et appeler le bon contrôleur. Point d'entrée unique de l'application." },
        { ch: 6, q: "Citez 2 frameworks PHP populaires.", a: "Symfony (MVC strict, grands projets) et Laravel (MVC + Eloquent, rapide à démarrer)." },
        { ch: 6, q: "Erreur courante en MVC ?", a: "Contrôleur trop gras — la logique métier doit être dans le Modèle ou un Service, pas le Contrôleur." },
        // Ch7-8 — Projet
        { ch: 7, q: "Quelle est la structure d'un projet MVC PHP ?", a: "public/ (index.php) + src/Controller/ + src/Model/ + src/View/ + config/ + vendor/" },
        { ch: 7, q: "Pourquoi utiliser un .htaccess ?", a: "Rediriger toutes les requêtes vers index.php (front controller) pour le routage." },
        { ch: 8, q: "Comment sécuriser un formulaire contre XSS ?", a: "<code>htmlspecialchars($input, ENT_QUOTES, 'UTF-8')</code> — échappe les balises HTML." },
        { ch: 8, q: "Comment valider un token CSRF ?", a: "Générer un token en session, l'ajouter en hidden dans le form, vérifier à la soumission." },
        { ch: 8, q: "Quelle est la différence entre GET et POST ?", a: "GET = lecture (données dans l'URL). POST = écriture (données dans le corps de la requête)." },
        { ch: 8, q: "Différence entre session et cookie ?", a: "Session = côté serveur (sécurisé). Cookie = côté client (visible, modifiable). La session utilise un cookie d'ID." }
    ];

    const chapters = [...new Set(flashcards.map(c => c.ch))].sort((a, b) => a - b);
    let activeFilter = 'all';

    function render() {
        const grid = document.getElementById('cards-grid');
        const filtered = activeFilter === 'all' ? flashcards : flashcards.filter(c => c.ch == activeFilter);
        document.getElementById('total-count').textContent = filtered.length;
        grid.innerHTML = filtered.map((c, i) => `
            <div class="flashcard" onclick="this.classList.toggle('flipped')">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <span class="flashcard-chapter">Chapitre ${c.ch}</span>
                        <h3>${c.q}</h3>
                        <div class="hint"><i class="fas fa-sync-alt"></i> Cliquer pour retourner</div>
                    </div>
                    <div class="flashcard-back">${c.a}</div>
                </div>
            </div>
        `).join('');
    }

    function initFilters() {
        const container = document.getElementById('filters');
        let html = '<button class="filter-btn active" data-ch="all">Tous</button>';
        chapters.forEach(ch => { html += `<button class="filter-btn" data-ch="${ch}">Ch.${ch}</button>`; });
        container.innerHTML = html;
        container.addEventListener('click', e => {
            if (!e.target.classList.contains('filter-btn')) return;
            container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeFilter = e.target.dataset.ch;
            render();
        });
    }

    initFilters();
    render();
    </script>
</body>
</html>
