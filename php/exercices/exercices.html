        {ch:1,title:"Créer une classe Voiture",diff:"facile",
         enonce:"Créez une classe <code>Voiture</code> avec les propriétés <code>$marque</code>, <code>$modele</code> et <code>$annee</code>. Ajoutez un constructeur et une méthode <code>decrire()</code> qui retourne une phrase descriptive.",
         hint:"Pensez à utiliser <code>$this->propriete</code> pour accéder aux attributs dans les méthodes.",
         solution:`class Voiture {
    public string \$marque;
    public string \$modele;
    public int \$annee;

    public function __construct(string \$marque, string \$modele, int \$annee) {
        \$this->marque = \$marque;
        \$this->modele = \$modele;
        \$this->annee = \$annee;
    }

    public function decrire(): string {

\$v = new Voiture("Peugeot", "308", 2023);

        {ch:1,title:"Méthodes magiques __toString",diff:"facile",

        // Ch2 — Héritage & Polymorphisme
        {ch:2,title:"Héritage : Forme → Cercle, Rectangle",diff:"moyen",
         enonce:"Créez une classe abstraite <code>Forme</code> avec une méthode abstraite <code>surface(): float</code>. Implémentez les classes <code>Cercle</code> (rayon) et <code>Rectangle</code> (largeur, hauteur). Testez le polymorphisme dans une boucle.",
         hint:"Utilisez <code>abstract class</code> et <code>extends</code>. Le polymorphisme consiste à appeler <code>surface()</code> sur un tableau de Formes.",
         solution:`abstract class Forme {
    abstract public function surface(): float;
}

class Cercle extends Forme {
    public function __construct(private float \$rayon) {}
    public function surface(): float {
        return M_PI * \$this->rayon ** 2;
    }
}

class Rectangle extends Forme {
    public function __construct(
        private float \$largeur,
        private float \$hauteur
    ) {}
    public function surface(): float {
        return \$this->largeur * \$this->hauteur;
    }
}

\$formes = [new Cercle(5), new Rectangle(4, 6)];
foreach (\$formes as \$f) {
    echo get_class(\$f) . " : " . round(\$f->surface(), 2) . "\\n";
}
// Cercle : 78.54
// Rectangle : 24`},

        {ch:2,title:"Interface Affichable",diff:"moyen",
         enonce:"Créez une interface <code>Affichable</code> avec une méthode <code>afficher(): string</code>. Implémentez-la dans <code>Produit</code> et <code>Client</code>. Parcourez un tableau mixte et affichez chaque élément.",

\$items = [new Produit("Clavier", 49.99), new Client("Ali", "ali@mail.com")];

        // Ch3 — Traits & Namespaces
        {ch:3,title:"Trait Horodatable",diff:"moyen",
         enonce:"Créez un trait <code>Horodatable</code> qui ajoute <code>$createdAt</code> et <code>$updatedAt</code>. Utilisez-le dans une classe <code>Article</code>. Ajoutez une méthode <code>touch()</code> pour mettre à jour <code>updatedAt</code>.",
         hint:"<code>use Horodatable;</code> dans la classe. Initialisez les dates dans le constructeur ou un initTimestamps().",
         solution:`trait Horodatable {
    private DateTime \$createdAt;
    private DateTime \$updatedAt;

    public function initTimestamps(): void {
        \$this->createdAt = new DateTime();
        \$this->updatedAt = new DateTime();
    }

    public function touch(): void {
        \$this->updatedAt = new DateTime();
    }

    public function getCreatedAt(): DateTime { return \$this->createdAt; }
    public function getUpdatedAt(): DateTime { return \$this->updatedAt; }
}

class Article {

\$a = new Article("Mon article");

        {ch:3,title:"Namespace et autoloading",diff:"difficile",
         enonce:"Organisez un mini-projet avec les namespaces : <code>App\\Entity\\User</code> et <code>App\\Service\\UserService</code>. Écrivez la fonction d'autoloading qui mappe <code>App\\</code> vers <code>src/</code>.",
         hint:"PSR-4 : remplacez les \\ par des / et ajoutez .php.",
         solution:`// src/Entity/User.php
namespace App\\Entity;

class User {
    public function __construct(
        private string \$name,
        private string \$email
    ) {}
    public function getName(): string { return \$this->name; }
}

// src/Service/UserService.php
namespace App\\Service;

use App\\Entity\\User;

class UserService {
    public function greet(User \$user): string {
        return "Bonjour " . \$user->getName();
    }
}

// index.php

    \$path = str_replace('App\\\\', 'src/', \$class);

        // Ch4 — Exceptions
        {ch:4,title:"Exception personnalisée",diff:"moyen",
         enonce:"Créez une exception <code>SoldeInsuffisantException</code>. Créez une classe <code>CompteBancaire</code> avec <code>debiter()</code> qui lance cette exception si le solde est insuffisant. Attrapez-la proprement.",
         hint:"Héritez de <code>Exception</code> et ajoutez éventuellement le solde actuel comme info supplémentaire.",
         solution:`class SoldeInsuffisantException extends Exception {
    public function __construct(
        private float \$solde,
        private float \$montant
    ) {
        parent::__construct(
            "Solde insuffisant : \$solde € disponible, \$montant € demandé"
        );
    }
}

class CompteBancaire {
    private float \$solde;

    public function __construct(float \$soldeInitial) {
        \$this->solde = \$soldeInitial;
    }

    public function debiter(float \$montant): void {
        if (\$montant > \$this->solde) {
            throw new SoldeInsuffisantException(\$this->solde, \$montant);
        }
        \$this->solde -= \$montant;
    }
}

try {
    \$compte = new CompteBancaire(100);
    \$compte->debiter(150); // lance l'exception
} catch (SoldeInsuffisantException \$e) {
    echo "⚠️ " . \$e->getMessage();
    // Solde insuffisant : 100 € disponible, 150 € demandé
}`},

        {ch:4,title:"Try / Catch / Finally",diff:"facile",
         enonce:"Écrivez une fonction <code>diviser(int $a, int $b): float</code> qui lance une exception si $b == 0. Utilisez <code>try/catch/finally</code> pour afficher un message \"Opération terminée\" dans tous les cas.",
         hint:"Le bloc <code>finally</code> s'exécute même après un return ou une exception.",
         solution:`function diviser(int \$a, int \$b): float {
    if (\$b === 0) {
        throw new InvalidArgumentException("Division par zéro !");
    }
    return \$a / \$b;
}

try {
    echo diviser(10, 0);
} catch (InvalidArgumentException \$e) {
    echo "Erreur : " . \$e->getMessage() . "\\n";
} finally {
    echo "Opération terminée.\\n";
}
// Erreur : Division par zéro !
// Opération terminée.`},

        // Ch5 — PDO
        {ch:5,title:"CRUD complet avec PDO",diff:"difficile",
         enonce:"Écrivez une classe <code>ProductRepository</code> qui implémente les 4 opérations CRUD (Create, Read, Update, Delete) sur une table <code>products</code> (id, name, price). Utilisez des requêtes préparées.",
         hint:"Injectez le PDO dans le constructeur. Utilisez <code>prepare() + execute()</code> pour chaque opération.",
         solution:`class ProductRepository {
    public function __construct(private PDO \$pdo) {}

    public function create(string \$name, float \$price): int {
        \$stmt = \$this->pdo->prepare(
            "INSERT INTO products (name, price) VALUES (:name, :price)"
        );
        \$stmt->execute(['name' => \$name, 'price' => \$price]);
        return (int) \$this->pdo->lastInsertId();
    }

    public function findById(int \$id): ?array {
        \$stmt = \$this->pdo->prepare(
            "SELECT * FROM products WHERE id = :id"
        );
        \$stmt->execute(['id' => \$id]);
        \$row = \$stmt->fetch(PDO::FETCH_ASSOC);
        return \$row ?: null;
    }

    public function update(int \$id, string \$name, float \$price): bool {
        \$stmt = \$this->pdo->prepare(
            "UPDATE products SET name = :name, price = :price WHERE id = :id"
        );
        return \$stmt->execute([
            'id' => \$id, 'name' => \$name, 'price' => \$price
        ]);
    }

    public function delete(int \$id): bool {
        \$stmt = \$this->pdo->prepare("DELETE FROM products WHERE id = :id");
        return \$stmt->execute(['id' => \$id]);
    }

    public function findAll(): array {
        return \$this->pdo->query("SELECT * FROM products")
                         ->fetchAll(PDO::FETCH_ASSOC);
    }
}`},

        // Ch6 — Architecture MVC
        {ch:6,title:"Mini routeur MVC",diff:"difficile",
         enonce:"Écrivez un routeur simple qui prend l'URL <code>?page=articles&action=list</code> et appelle la bonne méthode du bon contrôleur. Gérez le cas où la page n'existe pas (404).",
         hint:"Créez un tableau associatif page → classe contrôleur, puis vérifiez l'existence de la méthode avec <code>method_exists()</code>.",
         solution:`// public/index.php — Front Controller

// 1. Autoload
spl_autoload_register(function (\$class) {
    require_once '../src/' . str_replace('\\\\', '/', \$class) . '.php';
});

// 2. Routes : page → Controller
\$routes = [
    'articles' => ArticleController::class,
    'users'    => UserController::class,
];

// 3. Routeur
\$page   = \$_GET['page']   ?? 'articles';
\$action = \$_GET['action'] ?? 'list';

if (!isset(\$routes[\$page])) {
    http_response_code(404);
    echo "Page introuvable.";
    exit;
}

\$controllerClass = \$routes[\$page];
\$controller = new \$controllerClass();

if (!method_exists(\$controller, \$action)) {
    http_response_code(404);
    echo "Action '\$action' introuvable.";
    exit;
}

// 4. Exécution
\$controller->\$action();`},

        {ch:6,title:"Pattern Singleton pour la BDD",diff:"moyen",
         enonce:"Implémentez le pattern Singleton pour la connexion à la base de données. Le constructeur doit être privé, et une méthode statique <code>getInstance()</code> retourne l'unique instance de PDO.",
         hint:"Attribut <code>private static ?PDO $instance = null;</code> et constructeur <code>private</code>.",
         solution:`class Database {
    private static ?PDO \$instance = null;

    // Constructeur privé → pas de new Database()
    private function __construct() {}
    // Empêche le clonage
    private function __clone() {}

    public static function getInstance(): PDO {
        if (self::\$instance === null) {
            self::\$instance = new PDO(
                'mysql:host=localhost;dbname=app;charset=utf8mb4',
                'root', '',
                [
                    PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION,
                    PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                ]
            );
        }
        return self::\$instance;
    }
}

// Utilisation — une seule connexion partout
\$pdo = Database::getInstance();
\$users = \$pdo->query("SELECT * FROM users")->fetchAll();`},

        {ch:8,title:"Sécuriser un formulaire (XSS + CSRF)",diff:"difficile",
         enonce:"Créez un formulaire de commentaire sécurisé contre XSS et CSRF. Incluez la génération du token, la validation côté serveur, et l'échappement de l'affichage.",
         hint:"<code>htmlspecialchars()</code> pour XSS, <code>$_SESSION</code> + <code>hash_equals()</code> pour CSRF.",
         solution:`// Génération du token CSRF
session_start();
if (empty(\$_SESSION['csrf_token'])) {
    \$_SESSION['csrf_token'] = bin2hex(random_bytes(32));
}

// Traitement du formulaire
if (\$_SERVER['REQUEST_METHOD'] === 'POST') {
    // 1. Vérifier le token CSRF
    if (!hash_equals(\$_SESSION['csrf_token'], \$_POST['csrf'] ?? '')) {
        die("⚠️ Token CSRF invalide !");
    }

    // 2. Nettoyer les entrées
    \$commentaire = trim(\$_POST['commentaire'] ?? '');
    if (empty(\$commentaire)) {
        \$erreur = "Le commentaire est requis.";
    } else {
        // 3. Sauvegarder en BDD (requête préparée !)
        \$stmt = \$pdo->prepare("INSERT INTO commentaires (texte) VALUES (:texte)");
        \$stmt->execute(['texte' => \$commentaire]);
        \$succes = true;
        // Régénérer le token après soumission
        \$_SESSION['csrf_token'] = bin2hex(random_bytes(32));
    }
}
?>

<!-- Formulaire -->
<form method="POST">
    <input type="hidden" name="csrf" value="<?= \$_SESSION['csrf_token'] ?>">
    <textarea name="commentaire" required></textarea>
    <button type="submit">Envoyer</button>
</form>

<!-- Affichage sécurisé (anti-XSS) -->
<?php foreach (\$commentaires as \$c): ?>
    <p><?= htmlspecialchars(\$c['texte'], ENT_QUOTES, 'UTF-8') ?></p>
<?php endforeach; ?>`},

        {ch:8,title:"Authentification avec password_hash",diff:"moyen",
         enonce:"Écrivez les fonctions <code>register()</code> et <code>login()</code> qui utilisent <code>password_hash()</code> et <code>password_verify()</code> pour gérer les mots de passe de manière sécurisée.",
         hint:"JAMAIS stocker le mot de passe en clair. <code>password_hash()</code> utilise bcrypt par défaut.",
         solution:`function register(PDO \$pdo, string \$email, string \$password): int {
    // Hashage sécurisé (bcrypt)
    \$hash = password_hash(\$password, PASSWORD_DEFAULT);

    \$stmt = \$pdo->prepare(
        "INSERT INTO users (email, password) VALUES (:email, :password)"
    );
    \$stmt->execute(['email' => \$email, 'password' => \$hash]);
    return (int) \$pdo->lastInsertId();
}

function login(PDO \$pdo, string \$email, string \$password): bool {
    \$stmt = \$pdo->prepare("SELECT * FROM users WHERE email = :email");
    \$stmt->execute(['email' => \$email]);
    \$user = \$stmt->fetch(PDO::FETCH_ASSOC);

    if (!user) return false;

    // Vérification sécurisée
    if (password_verify(\$password, \$user['password'])) {
        session_start();
        \$_SESSION['user_id'] = \$user['id'];
        \$_SESSION['email']   = \$user['email'];
        return true;
    }
    return false;
}

// Utilisation
register(\$pdo, "alice@mail.com", "motdepasse123");
if (login(\$pdo, "alice@mail.com", "motdepasse123")) {
    echo "✅ Connecté !";
}`}

            <div class="ex-card">
                <span class="ch-tag">Chapitre ${ex.ch} — ${chNames[ex.ch] || ''}</span>
                <span class="diff-badge diff-${ex.diff}">${ex.diff}</span>
                <h3>${ex.title}</h3>
                <div class="enonce">${ex.enonce}</div>
                <button class="ex-toggle" onclick="toggle('hint-${uid}')"><i class="fas fa-lightbulb"></i> Indice</button>
                <button class="ex-toggle" onclick="toggle('sol-${uid}')" style="margin-left:.5rem;"><i class="fas fa-eye"></i> Solution</button>
                <div class="ex-hint" id="hint-${uid}">${ex.hint}</div>
                <div class="ex-solution" id="sol-${uid}"><pre><code>${ex.solution}</code></pre></div>
            </div>`;
        }).join('');
    }

    function toggle(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'none' || !el.style.display ? 'block' : 'none';
    }

    renderFilters();
    renderExercises();
    </script>
</body>
</html>
