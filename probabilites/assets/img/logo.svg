<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Dice dots pattern -->
  <g fill="white" opacity="0.2">
    <circle cx="60" cy="60" r="8"/>
    <circle cx="100" cy="60" r="8"/>
    <circle cx="140" cy="60" r="8"/>
    <circle cx="60" cy="100" r="8"/>
    <circle cx="140" cy="100" r="8"/>
    <circle cx="60" cy="140" r="8"/>
    <circle cx="100" cy="140" r="8"/>
    <circle cx="140" cy="140" r="8"/>
  </g>
  
  <!-- RD Text -->
  <text x="100" y="115" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="800" fill="white" text-anchor="middle">RD</text>
  
  <!-- Probability symbol -->
  <text x="100" y="155" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">PROBAS</text>
</svg>
