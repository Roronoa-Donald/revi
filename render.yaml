# Render Blueprint — déploiement automatique
# Documentation : https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cours-interactif
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
